# tarsd example configuration
# Usage:
#   go run ./cmd/tarsd --config ./config/tarsd.config.example.yaml --serve-api

mode: standalone
workspace_dir: ./workspace

# LLM provider
# provider: bifrost | openai | anthropic | gemini | gemini-native
llm_provider: anthropic
llm_auth_mode: api-key
llm_oauth_provider: ""
llm_base_url: https://api.anthropic.com
llm_model: claude-3-5-haiku-latest
llm_api_key: ${ANTHROPIC_API_KEY}

# Agent loop
agent_max_iterations: 20

# Heartbeat policy
heartbeat_active_hours: "09:00-22:00"
heartbeat_timezone: Asia/Seoul

# Cron
cron_run_history_limit: 200

# Notification fallback when no SSE clients are connected
notify_command: ""
# true/false is controlled via env: NOTIFY_WHEN_NO_CLIENTS

# Optional Bifrost defaults (used when llm_provider=bifrost)
bifrost_base_url: http://127.0.0.1:8080/v1
bifrost_api_key: ${BIFROST_API_KEY}
bifrost_model: openai/gpt-4o-mini

# Optional MCP servers in JSON string form
mcp_servers_json: '[{"name":"filesystem","command":"npx","args":["-y","@modelcontextprotocol/server-filesystem","."]}]'

# Skills / Plugins / MCP hot-load extensions
skills_enabled: true
skills_watch: true
skills_watch_debounce_ms: 200
skills_bundled_dir: ./skills
# skills_extra_dirs_json: '["/opt/team/skills"]'

plugins_enabled: true
plugins_watch: true
plugins_watch_debounce_ms: 200
plugins_bundled_dir: ./plugins
# plugins_extra_dirs_json: '["/opt/team/plugins"]'

# Optional tools (opt-in)
tools_apply_patch_enabled: false
tools_web_fetch_enabled: false
tools_web_search_enabled: false
tools_web_search_api_key: "" # brave api key
tools_web_search_provider: brave # brave | perplexity
tools_web_search_perplexity_api_key: ""
tools_web_search_perplexity_model: sonar
tools_web_search_perplexity_base_url: https://api.perplexity.ai/chat/completions
tools_web_search_cache_ttl_seconds: 60
tools_web_fetch_allow_private_hosts: false
# tools_web_fetch_private_host_allowlist_json: '["localhost","127.0.0.1"]'

# In-process gateway / channels (safe-by-default)
gateway_enabled: false
gateway_default_agent: ""
# gateway_agents_json: '[{"name":"worker","description":"external worker","command":"python3","args":["./worker_agent.py"],"working_dir":".","timeout_seconds":120,"enabled":true}]'
gateway_agents_watch: true
gateway_agents_watch_debounce_ms: 200
# Gateway persistence/recovery (additive, safe default)
gateway_persistence_enabled: true
gateway_runs_persistence_enabled: true
gateway_channels_persistence_enabled: true
gateway_runs_max_records: 2000
gateway_channels_max_messages_per_channel: 500
# default: ${workspace_dir}/_shared/gateway
gateway_persistence_dir: ./workspace/_shared/gateway
gateway_restore_on_startup: true
# /v1/runtime/extensions/reload also refreshes gateway executors automatically.
channels_local_enabled: false
channels_webhook_enabled: false
channels_telegram_enabled: false

# Additional OpenClaw-style tools (opt-in)
tools_message_enabled: false
tools_browser_enabled: false
tools_nodes_enabled: false
tools_gateway_enabled: false
