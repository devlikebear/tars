mode: standalone
workspace_dir: ./workspace

# ---- LLM provider pool ----
# Each alias defines "where to call + how to authenticate" — no model
# here. At minimum one provider must be defined. Credentials come
# from environment variables. Supported kinds: anthropic, openai,
# openai-codex, gemini, gemini-native, claude-code-cli.
llm_providers:
  default:
    kind: anthropic
    auth_mode: api-key
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com

# ---- Tier bindings ----
# Each tier binds to one provider alias + model + optional knobs.
# All three tiers (heavy/standard/light) must be configured. Mix
# multiple providers by adding entries above and referencing them
# here — e.g. `provider: codex` for a second alias.
llm_tiers:
  heavy:
    provider: default
    model: claude-opus-4-6
    reasoning_effort: high
  standard:
    provider: default
    model: claude-sonnet-4-6
    reasoning_effort: medium
  light:
    provider: default
    model: claude-haiku-4-5-20251001
    reasoning_effort: minimal

llm_default_tier: standard

# ---- Role → tier mapping (optional) ----
# Roles absent from this map fall back to llm_default_tier. Role
# names are validated at router build time — see internal/llm/role.go
# for the canonical list.
llm_role_defaults:
  chat_main: standard
  context_compactor: light
  memory_hook: light
  reflection_memory: light
  pulse_decider: light
  gateway_default: standard
  gateway_planner: heavy

agent_max_iterations: 8
