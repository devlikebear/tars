# tars example configuration
# Usage:
#   tars init                         # preferred starter path for packaged installs
#   tars doctor --fix                 # create starter files and check BYOK readiness
#   tars service install && tars service start
#   go run ./cmd/tars serve --config ./config/tars.config.example.yaml --serve-api
# Health check endpoint: GET /v1/healthz

runtime:
  mode: standalone
  workspace_dir: ./workspace
  session:
    default_id: ""
    telegram_scope: main

log:
  level: debug
  file: ""
  rotate:
    max_size_mb: 100
    max_days: 30
    max_backups: 5

api:
  auth_mode: required
  auth_token: ""
  user_token: ""
  admin_token: ""
  allow_insecure_local_auth: false
  max_inflight:
    chat: 2
    agent_runs: 4
  dashboard:
    auth_mode: inherit

llm:
  providers:
    default:
      kind: anthropic
      auth_mode: api-key
      base_url: https://api.anthropic.com
      api_key: ${ANTHROPIC_API_KEY}
  tiers:
    heavy:
      provider: default
      model: claude-opus-4-6
      reasoning_effort: high
    standard:
      provider: default
      model: claude-sonnet-4-6
      reasoning_effort: medium
    light:
      provider: default
      model: claude-haiku-4-5
      reasoning_effort: minimal
  default_tier: standard
  role_defaults:
    chat_main: standard
    context_compactor: light
    reflection_memory: light
    pulse_decider: light
    gateway_default: standard
    gateway_planner: heavy

memory:
  backend: file
  semantic:
    enabled: true
  embed:
    provider: gemini
    base_url: ""
    api_key: ${GEMINI_API_KEY}
    model: text-embedding-004
    dimensions: 768

usage:
  limits:
    daily_usd: 0
    weekly_usd: 0
    monthly_usd: 0
    mode: soft
  price_overrides: {}

automation:
  agent:
    max_iterations: 20
  pulse:
    enabled: true
    interval: 1m
    timeout: 2m
    active_hours: "00:00-24:00"
    timezone: Asia/Seoul
    min_severity: warn
    allowed_autofixes:
      - compress_old_logs
      - cleanup_stale_tmp
    notify_telegram: false
    notify_session_events: true
    cron_failure_threshold: 2
    stuck_run_minutes: 15
    disk_warn_percent: 85
    disk_critical_percent: 95
    delivery_failure_threshold: 3
    delivery_failure_window: 10m
    reflection_failure_threshold: 2
  reflection:
    enabled: true
    sleep_window: "02:00-05:00"
    timezone: Asia/Seoul
    tick_interval: 5m
    empty_session_age: 24h
    memory_lookback_hours: 24
    max_turns_per_session: 40
  cron:
    run_history_limit: 200
  notify:
    command: ""
    when_no_clients: false
  schedule:
    timezone: Asia/Seoul

assistant:
  enabled: false
  hotkey: ""
  whisper_bin: whisper
  ffmpeg_bin: ffmpeg
  tts_bin: say

compaction:
  trigger_tokens: 12000
  keep_recent_tokens: 4000
  keep_recent_fraction: 0.35
  llm_mode: auto
  llm_timeout_seconds: 20

tools:
  default_set: ""
  allow_high_risk_user: false
  web_search:
    enabled: false
    provider: brave
    api_key: ""
    cache_ttl_seconds: 60
    perplexity:
      api_key: ""
      model: sonar
      base_url: https://api.perplexity.ai/chat/completions
  web_fetch:
    enabled: false
    allow_private_hosts: false
    private_host_allowlist:
      - localhost
      - 127.0.0.1
  apply_patch:
    enabled: false
  message:
    enabled: false
  browser:
    enabled: false
  nodes:
    enabled: false
  gateway:
    enabled: false

vault:
  enabled: false
  addr: http://127.0.0.1:8200
  auth:
    mode: token
  token: ""
  namespace: ""
  timeout_ms: 1500
  kv:
    mount: secret
    version: 2
  approle:
    mount: approle
    role_id: ""
    secret_id: ""
  secret_path_allowlist:
    - sites/

browser:
  runtime:
    enabled: true
  default_profile: managed
  managed:
    headless: false
    executable_path: ""
    user_data_dir: ./workspace/_shared/browser/managed
  site_flows_dir: ./workspace/automation/sites
  auto_login:
    site_allowlist:
      - intranet
      - grafana

gateway:
  enabled: false
  default_agent: ""
  agents:
    list:
      - name: worker
        description: external worker
        command: python3
        args: ["./path/to/worker_agent.py"]
        working_dir: .
        timeout_seconds: 120
        enabled: true
    watch: true
    watch_debounce_ms: 200
  task_override:
    enabled: false
    allowed_aliases: []
    allowed_models: []
  persistence:
    enabled: true
    dir: ./workspace/_shared/gateway
  runs:
    persistence_enabled: true
    max_records: 2000
  channels:
    persistence_enabled: true
    max_messages_per_channel: 500
  subagents:
    max_threads: 4
    max_depth: 1
  consensus:
    enabled: false
    max_fanout: 3
    budget_tokens: 12000
    budget_usd: 2.5
    timeout_seconds: 120
    allowed_aliases: []
    concurrent_runs: 1
  restore_on_startup: true
  report:
    summary_enabled: true
  archive:
    enabled: false
    dir: ./workspace/_shared/gateway/archive
    retention_days: 30
    max_file_bytes: 10485760

channels:
  local:
    enabled: false
  webhook:
    enabled: false
  telegram:
    enabled: false
    dm_policy: pairing
    polling:
      enabled: false
    bot_token: ""

extensions:
  skills:
    enabled: true
    watch: true
    watch_debounce_ms: 200
    bundled_dir: ./skills
    extra_dirs: []
  plugins:
    enabled: true
    watch: true
    watch_debounce_ms: 200
    bundled_dir: ./plugins
    extra_dirs: []
    allow_mcp_servers: false
  mcp:
    command_allowlist:
      - npx
    servers:
      - name: filesystem
        command: npx
        args:
          - -y
          - '@modelcontextprotocol/server-filesystem'
          - .
