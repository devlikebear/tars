# tars-ui (client) example configuration
# Usage:
#   cd tars-ui && npm run dev -- --config ./config.example.yaml

server_url: http://127.0.0.1:43180
cased_server_url: http://127.0.0.1:43181
session_id: ""
verbose: false

# Tool policy/selector is configured on tarsd side
# (see ../config/tarsd.config.example.yaml)
# Gateway/channel/runs commands also depend on tarsd config:
# - /runs, /run {id}, /cancel-run {id}
# - /gateway status|reload|restart
#   (status includes agents telemetry + persistence/restore telemetry)
# - /channels
# - /reload (extensions + gateway executor refresh)
