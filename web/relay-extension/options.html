<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TARS Relay Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 24px;
      max-width: 620px;
      line-height: 1.4;
    }
    h1 { font-size: 20px; margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-top: 12px; }
    input, button {
      font: inherit;
      padding: 8px 10px;
      margin-top: 6px;
      width: 100%;
      box-sizing: border-box;
    }
    button { width: auto; margin-top: 16px; cursor: pointer; }
    .row { display: flex; gap: 8px; align-items: center; }
    .row input { width: auto; }
    .status {
      margin-top: 14px;
      padding: 10px;
      border-radius: 6px;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      white-space: pre-wrap;
      font-size: 13px;
    }
    .error { color: #b42318; }
  </style>
</head>
<body>
  <h1>TARS Relay Extension Settings</h1>
  <label for="relay-port">Relay Port</label>
  <input id="relay-port" type="number" min="1" max="65535" placeholder="43182" />

  <label for="relay-token">Relay Token</label>
  <input id="relay-token" type="password" placeholder="relay-..." autocomplete="off" />

  <div class="row">
    <input id="auto-reconnect" type="checkbox" checked />
    <label for="auto-reconnect" style="margin:0;font-weight:500;">Auto reconnect</label>
  </div>

  <label for="reconnect-delay">Reconnect Delay (ms)</label>
  <input id="reconnect-delay" type="number" min="500" step="100" placeholder="2000" />

  <div class="row">
    <button id="save-btn" type="button">Save</button>
    <button id="preflight-btn" type="button">Check Relay</button>
  </div>

  <div id="status" class="status">Loading...</div>

  <script src="options.js"></script>
</body>
</html>
